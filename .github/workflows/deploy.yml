name: Deploy

on:
  push:
    branches: [main]

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false   # never cancel a production deploy

# Web (Next.js) is deployed automatically by Vercel's GitHub App integration
# on every push to main — no CI job needed here.
#
# Railway (Go API) auto-deploys via its GitHub integration as well.
# This workflow is kept as a placeholder for future CI steps (lint, tests, etc.)

jobs:
  # ── Placeholder ─────────────────────────────────────────────────────────────
  # Both Railway and Vercel have native GitHub integrations that watch `main`
  # and deploy automatically. Add lint / test jobs here as needed.
  ci:
    name: CI
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type-check
        run: pnpm turbo type-check
